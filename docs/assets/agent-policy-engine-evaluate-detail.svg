<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="128%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#101828" flood-opacity="0.11"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#101828" flood-opacity="0.07"/>
    </filter>
    <marker id="arrowOrange" markerWidth="16" markerHeight="16" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L13,5 z" fill="#d76138"/>
    </marker>
    <marker id="arrowBlue" markerWidth="16" markerHeight="16" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L13,5 z" fill="#18324a"/>
    </marker>
    <style>
      .bg{fill:#f6efe6}.panel{fill:#fffefa;stroke:#dbe3d8;stroke-width:1.2;filter:url(#shadow)}.card{fill:#fffefa;stroke:#dbe3d8;stroke-width:1.1;filter:url(#soft)}
      .engine{fill:#fff0d8;stroke:#18324a;stroke-width:2.6;filter:url(#shadow)}.dark{fill:#18324a}.lineO{stroke:#d76138;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowOrange)}.lineB{stroke:#18324a;stroke-width:4.2;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowBlue)}.thin{stroke:#d8ded4;stroke-width:1.1}.dash{stroke:#9aa6b2;stroke-width:2;stroke-dasharray:7 8;fill:none}
      .blue{fill:#e8eefc;stroke:#ccd7f3}.green{fill:#e4f3e8;stroke:#c7e3d0}.mint{fill:#e7f3f2;stroke:#c8e1df}.peach{fill:#f9e3d5;stroke:#e6b496}.salmon{fill:#f6d3ce;stroke:#e5a29a}.purple{fill:#eee8fb;stroke:#d8cbf3}.yellow{fill:#fff1bd;stroke:#ead783}.red{fill:#f6c9c4;stroke:#df938b}.gray{fill:#f1f4f7;stroke:#d9e0e7}
      .title{font-family:Arial,sans-serif;font-weight:800;font-size:54px;fill:#142033}.subtitle{font-family:Arial,sans-serif;font-weight:500;font-size:22px;fill:#4f5f73}.h{font-family:Arial,sans-serif;font-weight:800;font-size:27px;fill:#172033}.h2{font-family:Arial,sans-serif;font-weight:800;font-size:21px;fill:#172033}.label{font-family:Arial,sans-serif;font-weight:760;font-size:15px;fill:#172033}.small{font-family:Arial,sans-serif;font-weight:500;font-size:13px;fill:#657286}.cn{font-family:Arial,sans-serif;font-weight:400;font-size:12px;fill:#7f8a99}.mono{font-family:Menlo,Consolas,monospace;font-weight:800;font-size:13px;fill:#344054}.white{font-family:Arial,sans-serif;font-weight:800;font-size:12px;fill:#fffefa}.num{font-family:Arial,sans-serif;font-weight:900;font-size:18px;fill:#fffefa}
    </style>
  </defs>

  <rect width="2400" height="1500" class="bg"/>

  <text x="92" y="82" class="title">Policy Engine Evaluate Detail</text>
  <text x="94" y="122" class="subtitle">Evaluate turns a normalized policy request into findings, risk signals, and required controls.</text>
  <text x="94" y="151" class="cn">中文：Evaluate 不直接执行，也不只是 true/false；它收集证据、风险信号和控制建议，交给 Decision Composer 组合最终决策。</text>
  <line x1="94" y1="176" x2="820" y2="176" stroke="#d8ded4" stroke-width="1.2"/>

  <!-- Main flow panel -->
  <rect x="70" y="205" width="2260" height="900" rx="38" class="panel"/>
  <rect x="112" y="234" width="96" height="28" rx="14" class="dark"/>
  <text x="160" y="253" class="white" text-anchor="middle">EVALUATE</text>
  <text x="112" y="294" class="h">From Policy Request to Evaluation Result</text>
  <text x="112" y="322" class="small">The important design is evaluator separation: deterministic boundaries, semantic/model signals, and runtime state.</text>
  <text x="112" y="345" class="cn">关键设计是 evaluator 分层：确定性边界、语义/模型信号、运行态判断分开做。</text>

  <!-- Input -->
  <rect x="112" y="410" width="360" height="560" rx="30" class="card"/>
  <circle cx="154" cy="458" r="18" class="dark"/><text x="154" y="465" class="num" text-anchor="middle">1</text>
  <text x="190" y="466" class="h">Policy Request</text>
  <text x="190" y="494" class="small">normalized facts from any Gate</text>
  <text x="190" y="516" class="cn">来自任意 Gate 的统一请求事实。</text>
  <g transform="translate(150 565)">
    <rect width="132" height="34" rx="17" class="blue"/><text x="66" y="23" class="label" text-anchor="middle">subject</text><text x="156" y="23" class="small">user / agent</text>
    <rect y="58" width="132" height="34" rx="17" class="green"/><text x="66" y="81" class="label" text-anchor="middle">action</text><text x="156" y="81" class="small">tool / write</text>
    <rect y="116" width="132" height="34" rx="17" class="peach"/><text x="66" y="139" class="label" text-anchor="middle">resource</text><text x="156" y="139" class="small">data / env</text>
    <rect y="174" width="132" height="34" rx="17" class="purple"/><text x="66" y="197" class="label" text-anchor="middle">context</text><text x="156" y="197" class="small">task / plan</text>
    <rect y="232" width="132" height="34" rx="17" class="salmon"/><text x="66" y="255" class="label" text-anchor="middle">signals</text><text x="156" y="255" class="small">PII / injection</text>
  </g>
  <line x1="150" y1="875" x2="432" y2="875" class="thin"/>
  <text x="150" y="908" class="mono">stage = tool</text>
  <text x="150" y="934" class="mono">action = send_email</text>
  <text x="150" y="960" class="mono">data = customer PII</text>

  <!-- Evaluator registry -->
  <rect x="570" y="410" width="980" height="560" rx="34" class="engine"/>
  <circle cx="612" cy="458" r="18" class="dark"/><text x="612" y="465" class="num" text-anchor="middle">2</text>
  <text x="648" y="466" class="h">Evaluator Registry</text>
  <text x="648" y="494" class="small">run applicable evaluators in parallel, then collect findings</text>
  <text x="648" y="516" class="cn">只运行适用的 evaluator，并行产出 findings。</text>

  <g transform="translate(620 560)">
    <rect width="420" height="170" rx="24" class="card"/>
    <text x="28" y="36" class="h2">Deterministic Evaluators</text>
    <text x="28" y="62" class="small">hard boundaries: permission, scope, tool metadata</text>
    <text x="28" y="86" class="cn">确定性边界：权限、租户、工具元数据、规则。</text>
    <rect x="28" y="112" width="80" height="30" rx="15" class="blue"/><text x="68" y="133" class="label" text-anchor="middle">AuthZ</text>
    <rect x="118" y="112" width="78" height="30" rx="15" class="green"/><text x="157" y="133" class="label" text-anchor="middle">RBAC</text>
    <rect x="206" y="112" width="78" height="30" rx="15" class="mint"/><text x="245" y="133" class="label" text-anchor="middle">ABAC</text>
    <rect x="294" y="112" width="96" height="30" rx="15" class="peach"/><text x="342" y="133" class="label" text-anchor="middle">ToolMeta</text>

    <rect x="470" width="420" height="170" rx="24" class="card"/>
    <text x="498" y="36" class="h2">Semantic / Model Evaluators</text>
    <text x="498" y="62" class="small">model-assisted risk signals, not authority granting</text>
    <text x="498" y="86" class="cn">模型辅助识别风险，但不能授予权限。</text>
    <rect x="498" y="112" width="92" height="30" rx="15" class="salmon"/><text x="544" y="133" class="label" text-anchor="middle">Injection</text>
    <rect x="600" y="112" width="88" height="30" rx="15" class="yellow"/><text x="644" y="133" class="label" text-anchor="middle">PII</text>
    <rect x="698" y="112" width="86" height="30" rx="15" class="purple"/><text x="741" y="133" class="label" text-anchor="middle">Intent</text>
    <rect x="794" y="112" width="74" height="30" rx="15" class="gray"/><text x="831" y="133" class="label" text-anchor="middle">LLM</text>

    <rect y="210" width="420" height="170" rx="24" class="card"/>
    <text x="28" y="246" class="h2">Runtime State Evaluators</text>
    <text x="28" y="272" class="small">budget, approval state, retries, trajectory</text>
    <text x="28" y="296" class="cn">运行态：预算、审批状态、重试、轨迹。</text>
    <rect x="28" y="322" width="92" height="30" rx="15" class="mint"/><text x="74" y="343" class="label" text-anchor="middle">Budget</text>
    <rect x="130" y="322" width="96" height="30" rx="15" class="blue"/><text x="178" y="343" class="label" text-anchor="middle">Approval</text>
    <rect x="236" y="322" width="78" height="30" rx="15" class="green"/><text x="275" y="343" class="label" text-anchor="middle">Trace</text>
    <rect x="324" y="322" width="76" height="30" rx="15" class="peach"/><text x="362" y="343" class="label" text-anchor="middle">Retry</text>

    <rect x="470" y="210" width="420" height="170" rx="24" class="card"/>
    <text x="498" y="246" class="h2">Policy Rules / DSL</text>
    <text x="498" y="272" class="small">OPA / Cedar / YAML / custom DSL</text>
    <text x="498" y="296" class="cn">策略规则：可版本化、可审计、可回归测试。</text>
    <rect x="498" y="322" width="76" height="30" rx="15" class="blue"/><text x="536" y="343" class="label" text-anchor="middle">OPA</text>
    <rect x="584" y="322" width="82" height="30" rx="15" class="green"/><text x="625" y="343" class="label" text-anchor="middle">Cedar</text>
    <rect x="676" y="322" width="78" height="30" rx="15" class="yellow"/><text x="715" y="343" class="label" text-anchor="middle">YAML</text>
    <rect x="764" y="322" width="78" height="30" rx="15" class="purple"/><text x="803" y="343" class="label" text-anchor="middle">DSL</text>
  </g>

  <!-- Findings aggregation -->
  <rect x="1650" y="410" width="590" height="560" rx="30" class="card"/>
  <circle cx="1692" cy="458" r="18" class="dark"/><text x="1692" y="465" class="num" text-anchor="middle">3</text>
  <text x="1728" y="466" class="h">Evaluation Result</text>
  <text x="1728" y="494" class="small">findings are evidence, not final execution</text>
  <text x="1728" y="516" class="cn">Evaluate 产出证据和建议，不直接执行。</text>
  <g transform="translate(1690 565)">
    <rect width="500" height="54" rx="18" class="red"/>
    <text x="24" y="33" class="label">finding: external_side_effect</text><text x="335" y="33" class="mono">high</text>
    <rect y="70" width="500" height="54" rx="18" class="salmon"/>
    <text x="24" y="103" class="label">finding: pii_detected</text><text x="335" y="103" class="mono">high</text>
    <rect y="140" width="500" height="54" rx="18" class="yellow"/>
    <text x="24" y="173" class="label">effect_hint: require_approval</text><text x="335" y="173" class="mono">control</text>
    <rect y="210" width="500" height="54" rx="18" class="purple"/>
    <text x="24" y="243" class="label">controls: approval + redact + audit</text><text x="335" y="243" class="mono">required</text>
  </g>
  <line x1="1690" y1="855" x2="2190" y2="855" class="thin"/>
  <text x="1690" y="892" class="mono">action_tier = L4 External Action</text>
  <text x="1690" y="920" class="mono">risk_level = high</text>
  <text x="1690" y="948" class="mono">ready for Decision Composer</text>

  <!-- arrows -->
  <path d="M472 690 C505 690 530 690 570 690" class="lineB"/>
  <text x="520" y="666" class="mono" text-anchor="middle">facts</text>
  <path d="M1550 690 C1585 690 1610 690 1650 690" class="lineO"/>
  <text x="1600" y="666" class="mono" text-anchor="middle">findings</text>

  <!-- Model note -->
  <rect x="570" y="1010" width="980" height="62" rx="24" fill="#fffefa" stroke="#e5c4a9"/>
  <text x="612" y="1048" class="h2">Model inside Evaluate?</text>
  <text x="848" y="1048" class="small">Yes, but as a risk signal generator. It can raise risk or request controls; it should not grant permission.</text>
  <text x="612" y="1070" class="cn">可以内嵌模型/embedding/分类器，但它只提供语义风险信号；权限和硬边界仍交给确定性规则。</text>

  <!-- Bottom architecture -->
  <rect x="70" y="1155" width="2260" height="260" rx="38" class="panel"/>
  <text x="112" y="1208" class="h">Implementation Pattern / 实现模式</text>
  <text x="112" y="1236" class="small">A practical Evaluate layer usually looks like this.</text>
  <text x="112" y="1259" class="cn">工程上通常按 registry + findings + composer 的方式实现。</text>

  <g transform="translate(112 1300)">
    <rect width="315" height="72" rx="22" class="blue"/>
    <text x="28" y="31" class="h2">Evaluator Registry</text><text x="28" y="55" class="cn">选择适用 evaluator</text>
    <rect x="365" width="315" height="72" rx="22" class="green"/>
    <text x="393" y="31" class="h2">Parallel Execution</text><text x="393" y="55" class="cn">并行判断，降低延迟</text>
    <rect x="730" width="315" height="72" rx="22" class="mint"/>
    <text x="758" y="31" class="h2">Finding Collector</text><text x="758" y="55" class="cn">统一 findings / evidence</text>
    <rect x="1095" width="315" height="72" rx="22" class="peach"/>
    <text x="1123" y="31" class="h2">Risk Scorer</text><text x="1123" y="55" class="cn">计算 risk_level</text>
    <rect x="1460" width="315" height="72" rx="22" class="salmon"/>
    <text x="1488" y="31" class="h2">Control Resolver</text><text x="1488" y="55" class="cn">合并 required controls</text>
    <rect x="1825" width="315" height="72" rx="22" class="purple"/>
    <text x="1853" y="31" class="h2">Audit Snapshot</text><text x="1853" y="55" class="cn">记录 policy version / evidence</text>
  </g>

  <text x="112" y="1395" class="mono">principle: rules guard hard boundaries; models detect ambiguous semantic risk.</text>
</svg>
