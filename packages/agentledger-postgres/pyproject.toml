[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentledger-postgres"
version = "1.3.1"
description = "Postgres StateStore adapter package for AgentLedger"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [{name = "AgentLedger Contributors"}]
keywords = ["agents", "runtime", "postgres", "state-store"]
dependencies = [
  "agentledger-runtime>=1.3,<2",
  "psycopg[binary]>=3.1",
]

[project.urls]
Homepage = "https://github.com/yaogdu/AgentLedger"
Repository = "https://github.com/yaogdu/AgentLedger"
Documentation = "https://github.com/yaogdu/AgentLedger/tree/main/docs"
Issues = "https://github.com/yaogdu/AgentLedger/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/agentledger_postgres"]

