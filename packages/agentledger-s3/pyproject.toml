[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentledger-s3"
version = "1.4.2"
description = "S3-compatible BlobStore adapter package for AgentLedger"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [{name = "AgentLedger Contributors"}]
keywords = ["agents", "runtime", "s3", "blob-store"]
dependencies = [
  "agentledger-runtime>=1.4,<2",
  "boto3>=1.34",
]

[project.urls]
Homepage = "https://github.com/yaogdu/AgentLedger"
Repository = "https://github.com/yaogdu/AgentLedger"
Documentation = "https://github.com/yaogdu/AgentLedger/tree/main/docs"
Issues = "https://github.com/yaogdu/AgentLedger/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/agentledger_s3"]

